name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Test job – spin up Postgres, run unit + integration tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mytestdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          source venv/bin/activate
          playwright install --with-deps chromium

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/mytestdb
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-for-testing-only
          REDIS_URL: ""
        run: |
          source venv/bin/activate
          pytest tests/unit/ -v --cov=app --cov-report=term-missing

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/mytestdb
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-for-testing-only
          REDIS_URL: ""
        run: |
          source venv/bin/activate
          pytest tests/integration/ -v --cov=app --cov-append --cov-report=term-missing

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/mytestdb
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret-key-for-testing-only
          REDIS_URL: ""
        run: |
          source venv/bin/activate
          pytest tests/e2e/ -v --ignore=tests/e2e/test_e2e.bk || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # ──────────────────────────────────────────────────────────────────────────
  # Security scan – Trivy on the Docker image
  # ──────────────────────────────────────────────────────────────────────────
  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t app:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:test'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy – build multi-arch image and push to Docker Hub (main branch only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/is601_module12:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/is601_module12:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/is601_module12:cache
          cache-to: type=inline,mode=max
